name: "Scrape ICE detention facilities"

on:
  schedule:
    - cron: '0 5 * * *' # every day at 05:00 UTC
  workflow_dispatch:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:

  scrape:
    if: github.event_name != 'pull_request'
    runs-on: [self-hosted]

    env:
      RENV_PATHS_CACHE: ~/renv-cache
      RENV_CONFIG_PPM_ENABLED: FALSE
      RENV_CONFIG_REPOS_OVERRIDE: https://packagemanager.posit.co/cran/__linux__/manylinux_2_28/latest

    steps:
      # Mint a DDO_BOT app token first. Using this token for the push and
      # `gh pr create` makes the resulting `pull_request: opened` event
      # trigger downstream workflows (the diff-pr workflow); PRs created with
      # the default GITHUB_TOKEN do not.
      - name: Generate DDO_BOT App token (this repo)
        id: ddo-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DDO_BOT_APP_ID }}
          private-key: ${{ secrets.DDO_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          lfs: true
          clean: true
          # Persist the DDO_BOT token in git config so the later `git push`
          # uses it (so push events also fire downstream workflows).
          token: ${{ steps.ddo-token.outputs.token }}

      - name: Ensure clean working tree and snapshot most recent dated file
        run: |
          git lfs pull
          git checkout -- .
          latest=$(ls data/facilities-from-ice-website-*.parquet 2>/dev/null | sort | tail -n 1)
          if [ -n "$latest" ]; then
            cp "$latest" /tmp/old-facilities-from-ice-website.parquet
          else
            # no prior dated file — use empty placeholder so diff treats everything as new
            cp data/facilities-from-ice-website.parquet /tmp/old-facilities-from-ice-website.parquet
          fi

      - name: Restore renv library
        run: |
          Rscript -e "
            renv::hydrate(sources = '~/R/aarch64-unknown-linux-gnu-library/4.5')
          "

      - name: Run scraper
        run: Rscript code/0-ice-website-scraper.R

      - name: Run process script (refresh stable file)
        run: Rscript code/1-process-ice-website.R

      - name: Stage today's dated file for diff
        run: |
          today_file="data/facilities-from-ice-website-$(date -u +%Y-%m-%d).parquet"
          cp "$today_file" /tmp/new-facilities-from-ice-website.parquet

      - name: Match new website facilities to existing codes
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: Rscript code/0-match-website-new-facilities.R

      - name: Check for changes
        id: check_changes
        env:
          GH_TOKEN: ${{ steps.ddo-token.outputs.token }}
        run: |
          today_file="data/facilities-from-ice-website-$(date -u +%Y-%m-%d).parquet"
          today_branch="facilities-update-$(date -u +%Y-%m-%d)"

          # Skip if today's branch already exists on the remote (e.g. from an
          # earlier run today whose PR was merged or closed). Re-pushing would
          # either be rejected as non-fast-forward or open a duplicate PR.
          if git ls-remote --exit-code --heads origin "$today_branch" >/dev/null 2>&1; then
            echo "Remote branch '$today_branch' already exists — skipping."
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          git checkout -b "$today_branch"
          git add "$today_file" data/facilities-from-ice-website.parquet \
                  data/facilities-website-matches.parquet
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if any open PR already contains these files
          changed_files=$(git diff --cached --name-only)
          open_prs=$(gh pr list --state open --json number --jq '.[].number')
          for pr in $open_prs; do
            pr_files=$(gh pr view "$pr" --json files --jq '.files[].path')
            for file in $changed_files; do
              if echo "$pr_files" | grep -qF "$file"; then
                echo "File '$file' already present in open PR #$pr — skipping."
                echo "changed=false" >> $GITHUB_OUTPUT
                exit 0
              fi
            done
          done

          # Generate change summary comparing previous dated file vs today's
          Rscript code/0-ice-website-diff.R

          # If binary files differ but data content is identical, discard and skip
          if grep -qF 'NO_REAL_CHANGES' /tmp/facilities-changes.txt; then
            echo "Binary files differ but data content is identical — skipping."
            git reset HEAD -- "$today_file" data/facilities-from-ice-website.parquet \
                              data/facilities-website-matches.parquet
            git checkout -- data/facilities-from-ice-website.parquet \
                            data/facilities-website-matches.parquet
            rm -f "$today_file"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Run CI-friendly data pipeline
        if: steps.check_changes.outputs.changed == 'true'
        env:
          GOOGLEGEOCODE_API_KEY: ${{ secrets.GOOGLEGEOCODE_API_KEY }}
        run: |
          # CI subset of run_all.sh — skips the 1-process-* scripts that read
          # from local Box folders or sibling repos. Their outputs are already
          # committed parquets that the rest of the pipeline picks up. Local
          # users should still run `bash code/run_all.sh` to refresh those
          # upstream inputs.
          bash code/run_ci.sh
          git add data/

      - name: Commit and push
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "ddo-bot@users.noreply.github.com"
          git config --local user.name "DDO Bot"
          git commit -m "Update ICE website facilities data [skip ci]"
          # checkout's `token:` configured the DDO_BOT token in git's
          # extraheader, so this push uses it.
          git push --set-upstream origin HEAD

      - name: Create pull request
        if: steps.check_changes.outputs.changed == 'true'
        id: create_pr
        env:
          GH_TOKEN: ${{ steps.ddo-token.outputs.token }}
        run: |
          {
            echo "Automated update: changes detected in ICE detention facilities data."
            echo ""
            cat /tmp/facilities-changes.txt
            if [ -s /tmp/website-match-summary.md ]; then
              echo ""
              cat /tmp/website-match-summary.md
            fi
          } > /tmp/pr-body.txt

          pr_url=$(gh pr create \
            --title "Facilities update $(date +%Y-%m-%d)" \
            --body-file /tmp/pr-body.txt \
            --reviewer graemeblair \
            --base main)
          pr_num="${pr_url##*/}"
          echo "pr_url=${pr_url}"     >> "$GITHUB_OUTPUT"
          echo "pr_number=${pr_num}"  >> "$GITHUB_OUTPUT"

      - name: Trigger diff workflow
        # repository_dispatch always fires, even from GITHUB_TOKEN — so the
        # diff workflow runs reliably without depending on the DDO_BOT app
        # having Actions: write permission.
        if: steps.create_pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST "repos/${{ github.repository }}/dispatches" \
            -f event_type=diff-pr \
            -F "client_payload[pr_number]=${{ steps.create_pr.outputs.pr_number }}"

  notify-ddo:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'facilities-update-')
    runs-on: ubuntu-latest
    steps:
      - name: Generate DDO_BOT App token for deportationdata.org
        id: ddo-app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DDO_BOT_APP_ID }}
          private-key: ${{ secrets.DDO_BOT_PRIVATE_KEY }}
          owner: deportationdata
          repositories: deportationdata.org

      - name: Trigger deportationdata.org rebuild
        env:
          GH_TOKEN: ${{ steps.ddo-app-token.outputs.token }}
        run: |
          gh api repos/deportationdata/deportationdata.org/dispatches \
            -f event_type=facilities-updated
