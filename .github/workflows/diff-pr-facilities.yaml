name: "Diff facilities-latest on PR"

on:
  # Auto-fired by the scrape workflow after it opens its daily PR.
  # repository_dispatch always triggers (unlike pull_request, which is
  # suppressed for PRs created by GITHUB_TOKEN or by an App without
  # Actions: write).
  repository_dispatch:
    types: [diff-pr]
  # Direct human pushes to PR branches still trigger via pull_request.
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'data/facilities-latest-sf.parquet'
      - 'data/facilities-latest.parquet'
  # Manual fallback — re-run the diff against any open PR by typing the
  # PR number into "Run workflow" in the Actions tab.
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to diff'
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  diff:
    runs-on: ubuntu-latest

    steps:
      # Resolve the PR number across all four event types and look up the
      # PR's head SHA via the API. (Looking it up unconditionally is simpler
      # than special-casing `pull_request` events that already carry it.)
      - name: Resolve PR ref
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          case "${{ github.event_name }}" in
            workflow_dispatch)    num="${{ github.event.inputs.pr_number }}" ;;
            repository_dispatch)  num="${{ github.event.client_payload.pr_number }}" ;;
            *)                    num="${{ github.event.pull_request.number }}" ;;
          esac
          ref=$(gh api "repos/${REPO}/pulls/${num}" --jq .head.sha)
          echo "number=${num}" >> "$GITHUB_OUTPUT"
          echo "ref=${ref}"    >> "$GITHUB_OUTPUT"

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.ref }}
          lfs: true

      - name: Checkout main into _main/
        uses: actions/checkout@v4
        with:
          ref: main
          lfs: true
          path: _main

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install minimal R deps
        # Only what diff-facilities-pr.R needs. setup-r-dependencies caches the
        # installed library across runs (keyed on the packages list + R version),
        # so warm runs skip the install entirely.
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            arrow
            dplyr
            tidyr
            stringr
            readr
            purrr
          cache-version: 1

      - name: Run diff script
        run: |
          Rscript code/diff-facilities-pr.R \
            _main/data/facilities-latest-sf.parquet \
            data/facilities-latest-sf.parquet \
            > /tmp/pr-diff-comment.md
          # GitHub caps comment bodies at ~65k chars; truncate defensively.
          head -c 60000 /tmp/pr-diff-comment.md > /tmp/pr-diff-comment.trimmed.md
          if [ $(wc -c < /tmp/pr-diff-comment.md) -gt 60000 ]; then
            printf "\n\n_…truncated at 60k chars._\n" >> /tmp/pr-diff-comment.trimmed.md
          fi

      - name: Post or update comment on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          # Find every existing pr-diff-bot comment. Use --paginate (PRs can have
          # >30 comments) and `contains` rather than `startswith` so a stray BOM
          # or leading whitespace can't hide the marker.
          ids=$(gh api --paginate "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.body != null and (.body | contains("<!-- pr-diff-bot -->"))) | .id')
          primary=$(echo "$ids" | head -n 1)
          echo "pr-diff-bot comments found: $(echo "$ids" | grep -c .) ; primary: '${primary:-none}'"

          # Clean up duplicate diff-bot comments left over from earlier broken
          # runs — keep the primary, delete the rest.
          echo "$ids" | tail -n +2 | while read -r id; do
            [ -n "$id" ] || continue
            echo "Deleting duplicate pr-diff-bot comment ${id}"
            gh api -X DELETE "repos/${REPO}/issues/comments/${id}" >/dev/null || true
          done

          # Build the JSON body explicitly. `gh api -F body=@file` URL-encodes
          # content, which was producing comments whose bodies didn't match the
          # marker on the next run.
          jq -Rs '{body: .}' < /tmp/pr-diff-comment.trimmed.md > /tmp/pr-comment-body.json

          if [ -n "$primary" ]; then
            echo "Patching primary comment ${primary}"
            gh api -X PATCH "repos/${REPO}/issues/comments/${primary}" \
              --input /tmp/pr-comment-body.json > /dev/null
          else
            echo "Creating new comment"
            gh api -X POST "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              --input /tmp/pr-comment-body.json > /dev/null
          fi
